<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In — VARKONIS</title>
<link rel="stylesheet" href="varkonis-core.css"/>
<style>
/* Page-Specific Layout */
html,body{height:100%}
body{display:grid;grid-template-columns:1fr 1fr;overflow:hidden;}
.left{background:var(--s1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;justify-content:space-between;padding:2.5rem;position:relative}
.lh{font-family:var(--font-head);font-size:clamp(2rem,3.5vw,3.2rem);font-weight:800;line-height:1;margin-bottom:1.2rem;text-transform:uppercase;}
.lh em{color:var(--a);font-style:normal;}
.lstats{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-top:2rem;}
.lstat{background:var(--s2);border:1px solid var(--bdr);padding:1.1rem;border-radius:0;}
.lsv{font-family:var(--font-mono);font-size:1.5rem;font-weight:800;color:var(--a)}
.right{display:flex;align-items:center;justify-content:center;padding:2.5rem;overflow-y:auto;background:var(--bg);}
.rbox{width:100%;max-width:420px}
.rh{font-family:var(--font-head);font-size:1.7rem;font-weight:800;text-transform:uppercase;margin-bottom:.35rem}
.rp{font-size:.85rem;color:var(--t2);margin-bottom:2.4rem}
.rp a{color:var(--a);text-decoration:underline;}
.fi{background:var(--s1);border:1px solid var(--bdr);padding:.78rem .9rem;font-family:var(--font-mono);font-size:.88rem;color:var(--t);outline:none;width:100%;border-radius:0;}
.fi:focus{border-color:var(--a);}
.err,.ok{display:none;padding:.7rem .9rem;font-family:var(--font-mono);font-size:.78rem;margin-bottom:1rem;border-radius:0;}
.err.show{display:block;background:rgba(255,51,51,.1);border:1px solid var(--r);color:var(--r);}
.ok.show{display:block;background:rgba(0,255,157,.1);border:1px solid var(--g);color:var(--g);}
.forgot{font-family:var(--font-mono);font-size:.7rem;color:var(--t3);text-transform:uppercase;display:block;text-align:right;margin-bottom:1.5rem;}
.forgot:hover{color:var(--a);}
@media(max-width:768px){body{grid-template-columns:1fr;overflow:auto}.left{display:none}}
</style>
</head>
<body>
<div class="left">
  <a href="index.html" class="logo"><div class="logo-ico">V</div>VARKONIS</a>
  <div style="position:relative;z-index:2">
    <h2 class="lh">Your capital.<br><em>Total clarity.</em></h2>
    <p style="color:var(--t2);line-height:1.8;">Join 840+ firms using VARKONIS to make faster, sharper decisions with institutional-grade financial intelligence.</p>
    <div class="lstats">
      <div class="lstat"><div class="lsv">$4.2B</div><div style="font-size:.68rem;color:var(--t3);text-transform:uppercase;">Assets analyzed</div></div>
      <div class="lstat"><div class="lsv">840+</div><div style="font-size:.68rem;color:var(--t3);text-transform:uppercase;">Active firms</div></div>
    </div>
  </div>
  <div style="font-family:var(--font-mono);font-size:.7rem;color:var(--t3);">SYS_SECURE // V.26.4</div>
</div>

<div class="right">
  <div class="rbox">
    <h1 class="rh">Authenticate</h1>
    <p class="rp">Terminal access required. <a href="signup.html">Request Clearance</a></p>
    
    <div class="err" id="err"></div>
    <div class="ok" id="ok"></div>
    
    <div style="margin-bottom:1rem;"><label style="font-family:var(--font-mono);font-size:.66rem;color:var(--t3);display:block;margin-bottom:.4rem;">Operator ID (Email)</label><input class="fi" type="email" id="email" placeholder="sys@varkonis.io"/></div>
    <div style="margin-bottom:.5rem;"><label style="font-family:var(--font-mono);font-size:.66rem;color:var(--t3);display:block;margin-bottom:.4rem;">Passcode</label><input class="fi" type="password" id="pw" placeholder="••••••••"/></div>
    
    <a href="forgot-password.html" class="forgot">Reset Passcode</a>
    
    <button class="btn-gi" id="sbtn" style="width:100%;">Initialize Session</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(()=> {
  const btn = document.getElementById('sbtn');
  const email = document.getElementById('email');
  const pw = document.getElementById('pw');
  const err = document.getElementById('err');
  const ok = document.getElementById('ok');
  
  // REPLACE WITH YOUR PUBLIC SUPABASE ANON KEY
  const supa = supabase.createClient('https://neaqsrrgqjdwjdpocuul.supabase.co', 'YOUR_PUBLIC_ANON_KEY_HERE');

  function setState(l){btn.disabled=l;btn.textContent=l?'Processing...':'Initialize Session';}
  function showErr(msg){err.textContent=msg;err.classList.add('show');ok.classList.remove('show');}
  function showOk(msg){ok.textContent=msg;ok.classList.add('show');err.classList.remove('show');}

  async function handleLogin(){
    const e = email.value.trim();
    const p = pw.value;
    
    if(!e||!p){showErr('Credentials required.');return;}
    setState(true);
    
    try {
      const { error } = await supa.auth.signInWithPassword({email: e, password: p});
      if(error) throw error;
      
      showOk('Handshake accepted. Routing...');
      // Strictly local routing
      setTimeout(()=>location.href='app-dashboard.html', 800);
    } catch(ex) {
      showErr(ex.message || 'Authentication rejected.');
    } finally {
      setState(false);
    }
  }

  btn.addEventListener('click', handleLogin);
  document.querySelectorAll('.fi').forEach(i=>i.addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin();}));
})();
</script>
</body>
</html>
