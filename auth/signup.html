<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Request Clearance — VARKONIS</title>
<link rel="stylesheet" href="varkonis-core.css"/>
<style>
/* Page-Specific Layout */
html,body{height:100%}
body{display:grid;grid-template-columns:1fr 1fr;overflow:hidden;}
.left{background:var(--s1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;justify-content:space-between;padding:2.5rem;}
.lh{font-family:var(--font-head);font-size:clamp(1.9rem,3.4vw,3rem);font-weight:800;line-height:1;text-transform:uppercase;margin-bottom:1.2rem}
.lh em{color:var(--a);font-style:normal;}
.right{display:flex;align-items:center;justify-content:center;padding:2.5rem;overflow-y:auto;background:var(--bg);}
.rbox{width:100%;max-width:440px}
.rh{font-family:var(--font-head);font-size:1.6rem;font-weight:800;text-transform:uppercase;margin-bottom:.3rem}
.rp{font-size:.84rem;color:var(--t2);margin-bottom:2rem}
.rp a{color:var(--a);text-decoration:underline;}
.fi,.fsel{background:var(--s1);border:1px solid var(--bdr);padding:.78rem .9rem;font-family:var(--font-mono);font-size:.88rem;color:var(--t);outline:none;width:100%;border-radius:0;}
.fi:focus,.fsel:focus{border-color:var(--a);}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.9rem;}
.msg{display:none;padding:.7rem .9rem;font-family:var(--font-mono);font-size:.78rem;margin-bottom:1rem;border-radius:0;}
.msg.ok{background:rgba(0,255,157,.1);border:1px solid var(--g);color:var(--g);}
.msg.err{background:rgba(255,51,51,.1);border:1px solid var(--r);color:var(--r);}
@media(max-width:768px){body{grid-template-columns:1fr;overflow:auto}.left{display:none}}
</style>
</head>
<body>
<div class="left">
  <a href="index.html" class="logo"><div class="logo-ico">V</div>VARKONIS</a>
  <div style="position:relative;z-index:2">
    <div style="font-family:var(--font-mono);color:var(--g);font-size:.7rem;margin-bottom:1rem;text-transform:uppercase;">[ Secure Provisioning ]</div>
    <h2 class="lh">Establish <em>Infrastructure.</em></h2>
    <p style="color:var(--t2);line-height:1.8;margin-bottom:2rem;">Deploy institutional-grade analytics, risk monitoring, and reporting systems for your firm.</p>
  </div>
  <div style="font-family:var(--font-mono);font-size:.7rem;color:var(--t3);">SYS_SECURE // V.26.4</div>
</div>

<div class="right">
  <div class="rbox">
    <h1 class="rh" id="rtitle">Request Access</h1>
    <p class="rp" id="rsub">Existing operator? <a href="login.html">Sign in</a></p>
    
    <div id="step1">
      <div class="frow2">
        <div><label style="font-family:var(--font-mono);font-size:.66rem;color:var(--t3);display:block;margin-bottom:.4rem;">First Name</label><input class="fi" type="text" id="first"/></div>
        <div><label style="font-family:var(--font-mono);font-size:.66rem;color:var(--t3);display:block;margin-bottom:.4rem;">Last Name</label><input class="fi" type="text" id="last"/></div>
      </div>
      <div style="margin-bottom:.9rem;"><label style="font-family:var(--font-mono);font-size:.66rem;color:var(--t3);display:block;margin-bottom:.4rem;">Firm Name</label><input class="fi" type="text" id="firm"/></div>
      <div style="margin-bottom:.9rem;"><label style="font-family:var(--font-mono);font-size:.66rem;color:var(--t3);display:block;margin-bottom:.4rem;">Corporate Email</label><input class="fi" type="email" id="email1"/></div>
      <div style="margin-bottom:1.5rem;"><label style="font-family:var(--font-mono);font-size:.66rem;color:var(--t3);display:block;margin-bottom:.4rem;">Secure Passcode</label><input class="fi" type="password" id="pw1"/></div>
      
      <div class="msg err" id="msg-err"></div>
      <div class="msg ok" id="msg-ok"></div>

      <button class="btn-gi" id="nextBtn" style="width:100%;">Provision Account</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(()=> {
  // REPLACE WITH YOUR PUBLIC SUPABASE ANON KEY
  const supa = supabase.createClient('https://neaqsrrgqjdwjdpocuul.supabase.co', 'YOUR_PUBLIC_ANON_KEY_HERE');
  
  const nextBtn = document.getElementById('nextBtn');
  const msgOk = document.getElementById('msg-ok');
  const msgErr = document.getElementById('msg-err');

  nextBtn.addEventListener('click', async () => {
    const first = document.getElementById('first').value;
    const last = document.getElementById('last').value;
    const firm = document.getElementById('firm').value;
    const email = document.getElementById('email1').value.trim();
    const pw = document.getElementById('pw1').value;

    if (!firm || !email || !pw) { 
        msgErr.textContent = 'Firm, Email, and Passcode are strictly required.';
        msgErr.style.display = 'block'; 
        return; 
    }
    
    nextBtn.disabled = true; 
    nextBtn.textContent = 'Encrypting...';
    msgOk.style.display = 'none'; 
    msgErr.style.display = 'none';
    
    try {
      const { data, error } = await supa.auth.signUp({
        email: email,
        password: pw,
        options: { data: { first_name: first, last_name: last, firm: firm } }
      });
      
      if (error) throw error;
      
      msgOk.textContent = 'Provisioning complete. Verify your email to activate terminal.';
      msgOk.style.display = 'block';
    } catch (ex) {
      msgErr.textContent = ex.message || 'Provisioning failed. Contact support.';
      msgErr.style.display = 'block';
    } finally {
      nextBtn.disabled = false;
      nextBtn.textContent = 'Provision Account';
    }
  });
})();
</script>
</body>
</html>
